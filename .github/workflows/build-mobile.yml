name: Build & Submit mobile (EAS)

# Full agentic mobile deployment:
#   push to main touching apps/mobile/** → EAS Build → EAS Submit to TestFlight + Play Internal.
#   workflow_dispatch is retained for manual one-off builds (e.g. preview profile, single platform).
#
# Required GitHub secret: EXPO_TOKEN
# Required EAS Environment variables (file-type, scope: Production):
#   - ASC_API_KEY_P8                  (App Store Connect API key, used in eas.json submit.ios)
#   - GOOGLE_SERVICE_ACCOUNT_JSON     (Google Play service account, used in eas.json submit.android)

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: 'Auto-submit to stores after build'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}"   >> "$GITHUB_OUTPUT"
            echo "submit=${{ inputs.submit }}"     >> "$GITHUB_OUTPUT"
          else
            # push to main → ship to production on all platforms
            echo "platform=all"        >> "$GITHUB_OUTPUT"
            echo "profile=production"  >> "$GITHUB_OUTPUT"
            echo "submit=true"         >> "$GITHUB_OUTPUT"
          fi

      - name: EAS Build
        working-directory: apps/mobile
        run: |
          eas build \
            --non-interactive \
            --wait \
            --platform ${{ steps.params.outputs.platform }} \
            --profile ${{ steps.params.outputs.profile }}

      - name: EAS Submit
        if: steps.params.outputs.submit == 'true' && steps.params.outputs.profile == 'production'
        working-directory: apps/mobile
        run: |
          eas submit \
            --non-interactive \
            --latest \
            --platform ${{ steps.params.outputs.platform }} \
            --profile ${{ steps.params.outputs.profile }}
