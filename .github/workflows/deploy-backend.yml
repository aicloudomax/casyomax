name: Deploy backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Bundle apps/backend with its node_modules into a single artifact dir
      # Oryx on Azure App Service won't re-install if node_modules is present.
      - name: Stage backend deployment artifact
        run: |
          mkdir -p _deploy
          rsync -a --exclude='temp_uploads' --exclude='.env*' --exclude='*.log' \
                apps/backend/ _deploy/

      - uses: actions/upload-artifact@v4
        with:
          name: backend
          path: _deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # These secret names were auto-created by Azure App Service when
          # the new repo was connected via Deployment Center — the matching
          # federated credential on caresync-backend's Managed Identity was
          # set up at the same time, so this works out of the box.
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0D5E93143DDB47C68DC22154574B7185 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9F8ABFEE8CD2466D81F91A46512CCF1E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A905FB22CB50475E92C16332FF95C835 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: caresync-backend
          slot-name: Production
          package: .
