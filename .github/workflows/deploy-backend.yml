name: Deploy backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Bundle apps/backend with its node_modules into a single artifact dir
      # Oryx on Azure App Service won't re-install if node_modules is present.
      - name: Stage backend deployment artifact
        run: |
          mkdir -p _deploy
          rsync -a --exclude='temp_uploads' --exclude='.env*' --exclude='*.log' \
                apps/backend/ _deploy/

      - uses: actions/upload-artifact@v4
        with:
          name: backend
          path: _deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # NOTE: when you create the new monorepo GitHub repo, add a federated
          # credential on the App Service for that repo, OR replace this block
          # with `creds: ${{ secrets.AZURE_CREDENTIALS }}` using a publish profile.
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_73E412C7628D47C89B889EBE05AB555D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DDF7DB7DB87440CFB7F57FF1431B4A58 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B42C1053A34243F59693D5F337DF3C3A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: caresync-backend
          slot-name: Production
          package: .
